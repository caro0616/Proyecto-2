<!-- HERO -->
<section class="hero">
  <div class="hero__inner container">
    <div class="hero__content">
      <h1 class="hero__title">
        El depósito dental<br>
        <span class="hero__highlight">#1</span> en Pitalito
      </h1>
      <div class="hero__actions">
        <a routerLink="/catalogo" class="btn btn--primary btn--lg">
          Ver Catálogo
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 8 16 12 12 16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </a>
        <a routerLink="/contacto" class="btn btn--outline btn--lg">
          Contáctanos
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        </a>
      </div>
    </div>

    <div class="hero__visual">
      <div class="hero__tagline">
        Todo lo que tu consultorio necesita,<br>en un solo lugar
      </div>
      <div class="hero__logo-big">
        <img src="/assets/logo.png" alt="Logo Dental Edna Pitalito" class="hero__logo-img" />
        <!-- <div class="hero__brand-text">
          <em>Dental</em>
          <strong>EDNA PITALITO</strong>
        </div> -->
      </div>
    </div>
  </div>
</section>
