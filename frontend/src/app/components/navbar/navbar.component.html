<header class="navbar" [class.navbar--scrolled]="scrolled()" [class.navbar--home]="isHomePage()">
  <div class="navbar__inner container">

    <!-- Logo: solo visible fuera de home -->
    @if (!isHomePage()) {
      <a routerLink="/" class="navbar__logo">
        <img src="assets/logo.png" alt="Dental Edna Pitalito" class="navbar__logo-img" />
      </a>
    }

    <!-- Main Nav -->
    <nav class="navbar__nav" [class.navbar__nav--centered]="isHomePage()">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a>

      <div class="catalog-dropdown">
        <button class="navbar__nav-btn" (click)="toggleCatalog($event)">
          Catálogo
          <svg width="11" height="11" viewBox="0 0 12 12" fill="currentColor"><path d="M6 8L1 3h10L6 8z"/></svg>
        </button>
        @if (catalogOpen()) {
          <div class="catalog-dropdown__menu">
            <a routerLink="/catalogo" (click)="catalogOpen.set(false)">Todos los productos</a>
            @for (link of subNavLinks; track link.label) {
              <a routerLink="/catalogo" [queryParams]="link.params" (click)="catalogOpen.set(false)">{{ link.label }}</a>
            }
          </div>
        }
      </div>

      <!-- <a routerLink="/politicas">Políticas</a>
      <a routerLink="/contacto">Contacto</a> -->
    </nav>

    <!-- Actions -->
    <div class="navbar__actions">
      <button class="icon-btn" (click)="toggleSearch()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      </button>

      <!-- User icon -->
      @if (authService.isLoggedIn()) {
        <div class="user-dropdown">
          <button class="icon-btn user-dropdown__trigger">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
          <div class="user-dropdown__menu">
            <span class="user-dropdown__name">{{ userName }}</span>
            <a routerLink="/carrito">Mi Carrito</a>
            <button (click)="logout()">Cerrar sesión</button>
          </div>
        </div>
      } @else {
        <a routerLink="/auth" class="icon-btn">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
      }

      <a routerLink="/carrito" class="icon-btn navbar__cart-btn">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        @if (cartService.count() > 0) {
          <span class="cart-badge">{{ cartService.count() }}</span>
        }
      </a>
    </div>
  </div>

  <!-- Search bar -->
  @if (searchOpen()) {
    <div class="navbar__search">
      <div class="container">
        <div class="navbar__search-inner">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar productos dentales…" autofocus
                 [value]="searchQuery()" (input)="searchQuery.set($any($event.target).value)"
                 (keydown.enter)="onSearchSubmit()" />
          <button (click)="searchOpen.set(false)">✕</button>
        </div>
      </div>
    </div>
  }
</header>
