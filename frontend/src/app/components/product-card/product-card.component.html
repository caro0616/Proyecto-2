<a class="product-card" [class.product-card--small]="size === 'small'" [routerLink]="['/producto', product.id]">
  <div class="product-card__img-wrap">
    <img [src]="imageUrl" [alt]="product.name" loading="lazy" />
    <button class="product-card__fav icon-btn" [class.active]="product.isFavorite" (click)="toggleFavorite($event)" title="Favorito">
      <svg width="18" height="18" viewBox="0 0 24 24" [attr.fill]="product.isFavorite ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </button>
    @if (product.stock <= 0) {
      <span class="product-card__badge product-card__badge--out">Agotado</span>
    } @else if (product.stock <= 5) {
      <span class="product-card__badge product-card__badge--low">Quedan {{ product.stock }}</span>
    }
  </div>

  <div class="product-card__body">
    <p class="product-card__category">{{ product.category }}</p>
    <h3 class="product-card__name">{{ product.name }}</h3>
    <p class="product-card__brand" *ngIf="product.brand">{{ product.brand }}</p>
    <p class="product-card__price">$ {{ product.price | number:'1.0-0' }}</p>
  </div>
</a>
